<svg width="680" height="200" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Rogue Coding wordmark</title>
  <desc>Rogue Coding wordmark with short centered accent bar above company name</desc>

  <style>
    .logo-name { font-family: Arial, sans-serif; font-weight: 700; font-size: 48px; fill: #FFFFFF; letter-spacing: 3px; }
    .logo-tag  { font-family: Arial, sans-serif; font-weight: 400; font-size: 14px; fill: #E94560; letter-spacing: 7px; }
  </style>

  <rect width="680" height="200" rx="12" fill="#1A1A2E"/>

  <line x1="300" y1="44" x2="380" y2="44" stroke="#3A5080" stroke-width="4" stroke-linecap="round"/>
  <line x1="318" y1="52" x2="362" y2="52" stroke="#3A5080" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <text x="340" y="100" text-anchor="middle" class="logo-name">ROGUE CODING</text>

  <text x="340" y="128" text-anchor="middle" class="logo-tag">WEB · AI · BUILT DIFFERENT</text>
  <line x1="190" y1="134" x2="490" y2="134" stroke="#E94560" stroke-width="1" opacity="0.8"/>

  <text x="340" y="164" text-anchor="middle" font-family="Arial" font-size="16" letter-spacing="1" fill="#3A6090">// upload logo + business plan → live site in minutes</text>
</svg>
